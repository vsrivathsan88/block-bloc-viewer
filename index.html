<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>block-bloc · viewer</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #050507; color: #eef; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      canvas { display: block; }
      #info {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 12px 16px; border-radius: 10px;
        max-width: 320px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.08);
      }
      #info .label { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; opacity: .55; }
      #info .title { font-size: 14px; margin: 2px 0 8px 0; }
      #info .status { font-size: 12px; opacity: .8; }
      #info a { color: #9cf; }
      #info button {
        margin-top: 8px; background: #3576cf; color: #fff; border: none;
        border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;
      }
      #info button:hover { background: #4286e0; }
      #controls {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 10px 14px; border-radius: 10px;
        font-size: 11px; opacity: .8; backdrop-filter: blur(8px);
      }
      #controls kbd { background: rgba(255,255,255,.12); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 10px; }
      #adjust {
        position: fixed; bottom: 12px; right: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 10px 14px; border-radius: 10px;
        font-size: 11px; backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 4px;
      }
      #adjust label { display: flex; gap: 6px; align-items: center; opacity: .8; }
      #adjust input[type="number"] { width: 60px; background: rgba(255,255,255,.08); color: #eef; border: 1px solid rgba(255,255,255,.12); border-radius: 4px; padding: 2px 4px; font-family: ui-monospace, monospace; font-size: 11px; }
      #adjust button { background: rgba(255,255,255,.12); color: #eef; border: none; border-radius: 4px; padding: 3px 6px; font-size: 11px; cursor: pointer; margin-top: 4px; }
      #adjust button:hover { background: rgba(255,255,255,.18); }
      #bbox-info { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.5; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div id="info">
      <div class="label">block-bloc</div>
      <div class="title" id="title">living-room</div>
      <div class="status" id="status">Loading splat via Spark…</div>
      <button id="go-inside" style="display:none">↵ go inside the room</button>
      <button id="reset-view" style="display:none; background:#444">⤺ outside view</button>
    </div>
    <div id="controls">
      <span id="mode-orbit"><kbd>drag</kbd> orbit · <kbd>scroll</kbd> zoom · <kbd>click</kbd> walk</span>
      <span id="mode-walk" style="display:none">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> walk · <kbd>⇧</kbd> run · <kbd>Q</kbd>/<kbd>E</kbd> down/up · mouse to look · <kbd>ESC</kbd> exit
      </span>
    </div>
    <div id="walk-hint" style="
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,.72); padding: 14px 22px; border-radius: 10px;
      font-size: 13px; backdrop-filter: blur(8px); pointer-events: none;
      border: 1px solid rgba(255,255,255,.12); display: none;
    ">click to walk · WASD · ⇧ to run · ESC to exit</div>
    <div id="adjust">
      <label>flip Y <input type="checkbox" id="flip-y-in" /></label>
      <label>flip Z <input type="checkbox" id="flip-z-in" /></label>
      <label>scale <input type="number" id="scale-in" step="0.1" /></label>
      <label>y off <input type="number" id="yoff-in" step="0.1" /></label>
      <button id="copy-url">copy URL</button>
      <div id="bbox-info"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.180.0",
          "three/addons/": "https://esm.sh/three@0.180.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
      import { SparkRenderer, SplatMesh } from "https://esm.sh/@sparkjsdev/spark@2.1.0?deps=three@0.180.0";

      const params = new URLSearchParams(window.location.search);
      const DEFAULT_SPZ = "https://cdn.marble.worldlabs.ai/bd1c3e7a-e412-4950-bb82-045f95f047a5/0dea05c6-6b15-4d51-bc0d-5f46b5e3df5a_ceramic_500k.spz";
      const spzUrl = params.get("spz") || DEFAULT_SPZ;
      const titleArg = params.get("title");
      if (titleArg) document.getElementById("title").textContent = titleArg;

      // Marble splats are natively Y-up (web/Three.js convention), so by default
      // we apply NO rotation. flip_y toggles a 180° X-axis flip (upside-down fix)
      // if a particular splat needs it. flip_z spins 180° around Y.
      let flipY = params.get("flip_y") === "true";   // default false
      let flipZ = params.get("flip_z") === "true";
      let scaleVal = parseFloat(params.get("scale") || "1.0");
      let yOffset = parseFloat(params.get("y_offset") || "0.0");

      const flipYEl = document.getElementById("flip-y-in"); flipYEl.checked = flipY;
      const flipZEl = document.getElementById("flip-z-in"); flipZEl.checked = flipZ;
      const scaleEl = document.getElementById("scale-in"); scaleEl.value = String(scaleVal);
      const yoffEl  = document.getElementById("yoff-in");  yoffEl.value  = String(yOffset);

      const status = document.getElementById("status");
      const bboxInfo = document.getElementById("bbox-info");
      const goInside = document.getElementById("go-inside");
      const resetView = document.getElementById("reset-view");

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050507);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 500);
      camera.position.set(0, 0, 3);     // placeholder; will be reset after auto-fit
      camera.lookAt(0, 0, 0);

      const spark = new SparkRenderer({ renderer });
      scene.add(spark);

      const splatGroup = new THREE.Group();
      const applyTransform = () => {
        splatGroup.rotation.set(
          flipY ? Math.PI : 0,        // 180° around X (upside-down fix)
          flipZ ? Math.PI : 0,        // 180° around Y (front/back fix)
          0,
        );
        splatGroup.position.set(0, yOffset, 0);
        splatGroup.scale.setScalar(scaleVal);
        // Refit camera after a transform change
        if (lastBbox) fitCamera(lastBbox, currentMode);
      };
      scene.add(splatGroup);

      const splat = new SplatMesh({ url: spzUrl });
      splatGroup.add(splat);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 0.001;
      controls.maxDistance = 500;
      controls.update();

      // --- WASD walk mode via PointerLockControls ---
      const fps = new PointerLockControls(camera, renderer.domElement);
      const walkHint = document.getElementById("walk-hint");
      const modeOrbit = document.getElementById("mode-orbit");
      const modeWalk  = document.getElementById("mode-walk");

      const keys = { w:false, a:false, s:false, d:false, q:false, e:false, shift:false };
      addEventListener("keydown", (ev) => {
        if (ev.repeat) return;
        switch (ev.code) {
          case "KeyW": case "ArrowUp":    keys.w = true; break;
          case "KeyA": case "ArrowLeft":  keys.a = true; break;
          case "KeyS": case "ArrowDown":  keys.s = true; break;
          case "KeyD": case "ArrowRight": keys.d = true; break;
          case "KeyQ": keys.q = true; break;
          case "KeyE": keys.e = true; break;
          case "ShiftLeft": case "ShiftRight": keys.shift = true; break;
        }
      });
      addEventListener("keyup", (ev) => {
        switch (ev.code) {
          case "KeyW": case "ArrowUp":    keys.w = false; break;
          case "KeyA": case "ArrowLeft":  keys.a = false; break;
          case "KeyS": case "ArrowDown":  keys.s = false; break;
          case "KeyD": case "ArrowRight": keys.d = false; break;
          case "KeyQ": keys.q = false; break;
          case "KeyE": keys.e = false; break;
          case "ShiftLeft": case "ShiftRight": keys.shift = false; break;
        }
      });

      // Click on canvas → enter walk mode (locks pointer)
      renderer.domElement.addEventListener("click", () => {
        if (!fps.isLocked) fps.lock();
      });

      fps.addEventListener("lock", () => {
        controls.enabled = false;     // disable orbit while walking
        modeOrbit.style.display = "none";
        modeWalk.style.display = "";
        walkHint.style.display = "none";
      });
      fps.addEventListener("unlock", () => {
        controls.enabled = true;
        controls.target.copy(camera.position.clone().add(new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion)));
        controls.update();
        modeOrbit.style.display = "";
        modeWalk.style.display = "none";
        walkHint.style.display = "";
      });

      // Walk-mode movement speeds in m/s (Marble worlds are in metric units).
      const SPEED_WALK = 1.6;     // ~5.2 ft/s, average walking pace
      const SPEED_RUN  = 5.0;     // ~16 ft/s, a fast jog
      const SPEED_UP   = 1.2;     // Q/E vertical drift

      const clock = new THREE.Clock();
      function tick() {
        const dt = Math.min(clock.getDelta(), 0.05);  // clamp for tab-switch jumps

        if (fps.isLocked) {
          const horizSpeed = (keys.shift ? SPEED_RUN : SPEED_WALK) * dt;
          let mx = 0, mz = 0;
          if (keys.w) mz += 1;
          if (keys.s) mz -= 1;
          if (keys.a) mx -= 1;
          if (keys.d) mx += 1;
          // Normalize diagonal so combined keys don't go √2 faster
          const len = Math.hypot(mx, mz);
          if (len > 0) { mx = (mx / len) * horizSpeed; mz = (mz / len) * horizSpeed; }
          fps.moveRight(mx);
          fps.moveForward(mz);
          if (keys.q) camera.position.y -= SPEED_UP * dt;
          if (keys.e) camera.position.y += SPEED_UP * dt;
        } else {
          controls.update();
        }
        renderer.render(scene, camera);
      }
      renderer.setAnimationLoop(tick);

      // --- Auto-fit on splat load ---
      let lastBbox = null;
      let currentMode = "outside"; // or "inside"

      function computeBbox() {
        // Spark's SplatMesh exposes a bounding-box approximation via Three's
        // Box3.setFromObject after the splat data has been processed. We try
        // a few times because the bbox is empty immediately after construction.
        const box = new THREE.Box3().setFromObject(splatGroup);
        if (box.isEmpty() || !isFinite(box.min.x) || !isFinite(box.max.x)) return null;
        return box;
      }

      function fitCamera(box, mode) {
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        const diag = size.length();

        if (mode === "inside") {
          // Place camera INSIDE the room — at the geometric center, raised toward
          // the top quarter (eye-height heuristic). Target slightly forward.
          const eyeY = box.min.y + size.y * 0.6;  // 60% up — roughly eye level for an interior
          camera.position.set(center.x, eyeY, center.z);
          // Look forward along +Z by default (but if the splat is small in Z, look at +X)
          const forward = size.z >= size.x ? new THREE.Vector3(0, 0, size.z * 0.45) : new THREE.Vector3(size.x * 0.45, 0, 0);
          controls.target.copy(new THREE.Vector3(center.x, eyeY, center.z).add(forward));
        } else {
          // OUTSIDE: pull back to ~1.5× the diagonal, look at center.
          const dist = diag * 1.3;
          camera.position.set(center.x + dist * 0.5, center.y + dist * 0.4, center.z + dist * 0.8);
          controls.target.copy(center);
        }
        camera.near = Math.max(0.001, diag * 0.001);
        camera.far  = diag * 50;
        camera.updateProjectionMatrix();
        controls.update();
        currentMode = mode;
        goInside.style.display  = mode === "outside" ? "" : "none";
        resetView.style.display = mode === "inside" ? "" : "none";
        bboxInfo.textContent = `bbox: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)} m`;
      }

      // Poll for bbox to be ready (Spark loads asynchronously).
      let attempts = 0;
      const fitInterval = setInterval(() => {
        attempts++;
        const box = computeBbox();
        if (box && box.getSize(new THREE.Vector3()).length() > 0.1) {
          lastBbox = box;
          fitCamera(box, "inside"); // start INSIDE the room — that's the whole point of block-bloc
          status.innerHTML = `Inside the room · <a href="${spzUrl}" target="_blank">.spz</a>`;
          walkHint.style.display = "";   // surface the WASD hint once geometry loads
          clearInterval(fitInterval);
        } else if (attempts > 40) {  // give up after ~20s
          clearInterval(fitInterval);
          status.textContent = "Splat loaded but couldn't compute bounds — try the flip toggles ↓";
        }
      }, 500);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      flipYEl.addEventListener("change", () => { flipY = flipYEl.checked; applyTransform(); });
      flipZEl.addEventListener("change", () => { flipZ = flipZEl.checked; applyTransform(); });
      scaleEl.addEventListener("input", () => { scaleVal = parseFloat(scaleEl.value) || 1; applyTransform(); });
      yoffEl.addEventListener("input",  () => { yOffset  = parseFloat(yoffEl.value)  || 0; applyTransform(); });

      goInside.addEventListener("click", () => { if (lastBbox) fitCamera(lastBbox, "inside"); });
      resetView.addEventListener("click", () => { if (lastBbox) fitCamera(lastBbox, "outside"); });

      document.getElementById("copy-url").addEventListener("click", () => {
        const p = new URLSearchParams();
        p.set("spz", spzUrl);
        if (titleArg) p.set("title", titleArg);
        p.set("flip_y", String(flipY));
        p.set("flip_z", String(flipZ));
        p.set("scale", String(scaleVal));
        p.set("y_offset", String(yOffset));
        const u = `${location.origin}${location.pathname}?${p.toString()}`;
        navigator.clipboard.writeText(u);
        const btn = document.getElementById("copy-url");
        const prev = btn.textContent;
        btn.textContent = "copied!";
        setTimeout(() => { btn.textContent = prev; }, 1200);
      });
    </script>
  </body>
</html>
