<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>block-bloc · viewer</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #050507; color: #eef; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      canvas { display: block; }
      #info {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 12px 16px; border-radius: 10px;
        max-width: 360px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.08);
      }
      #info .label { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; opacity: .55; }
      #info .title { font-size: 14px; margin: 2px 0 8px 0; }
      #info .status { font-size: 12px; opacity: .8; }
      #info a { color: #9cf; }
      #controls {
        position: fixed; bottom: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 10px 14px; border-radius: 10px;
        font-size: 11px; opacity: .85; backdrop-filter: blur(8px);
      }
      #controls kbd { background: rgba(255,255,255,.12); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 10px; }
      #adjust {
        position: fixed; bottom: 12px; right: 12px; z-index: 10;
        background: rgba(0,0,0,.72); padding: 10px 14px; border-radius: 10px;
        font-size: 11px; backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 4px;
      }
      #adjust label { display: flex; gap: 6px; align-items: center; opacity: .85; }
      #adjust button { background: rgba(255,255,255,.12); color: #eef; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; margin-top: 4px; }
      #adjust button:hover { background: rgba(255,255,255,.18); }
      #record-overlay { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: #e74c3c; z-index: 20; transition: width .1s linear; display: none; }
      #record-status { position: fixed; top: 14px; right: 14px; z-index: 20; background: rgba(231,76,60,.9); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: ui-monospace, monospace; display: none; }
    </style>
  </head>
  <body>
    <div id="info">
      <div class="label">block-bloc</div>
      <div class="title" id="title">living-room</div>
      <div class="status" id="status">Loading splat via Spark…</div>
    </div>
    <div id="controls">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move · <kbd>Q</kbd>/<kbd>E</kbd> roll · <kbd>⇧</kbd> faster · <kbd>drag</kbd> look
    </div>
    <div id="adjust">
      <label>flip Y <input type="checkbox" id="flip-y-in" /></label>
      <label>flip Z <input type="checkbox" id="flip-z-in" /></label>
      <button id="reset-view">↵ back to capture pose</button>
      <button id="record-flythrough" style="background:#3576cf;color:#fff">🎬 record flythrough</button>
      <button id="copy-url">copy URL</button>
    </div>
    <div id="record-overlay"></div>
    <div id="record-status"></div>

    <script type="importmap">
      { "imports": { "three": "https://esm.sh/three@0.180.0" } }
    </script>
    <script type="module">
      // Viewer follows World Labs' OWN recipe for Marble worlds, taken verbatim
      // from worldlabsai/worldlabs-api-examples/web-generate-world + the Spark
      // docs (loading-splats.md) + Spark's streaming-lod example (which ships
      // real Marble worlds). The whole thing is 3 facts:
      //
      //   1. Marble .spz is OpenCV convention (y-down). Re-orient to OpenGL
      //      with a 180° rotation about X: splat.quaternion.set(1, 0, 0, 0).
      //   2. The generation viewpoint IS the splat origin. There is NO camera-
      //      pose metadata in the world JSON or the .spz. So the camera starts
      //      at (0,0,0) with identity orientation — that's the original pano
      //      camera pose, guaranteed inside the room.
      //   3. SparkControls gives free-fly FPS (WASD + Q/E roll + Shift, drag to
      //      look). World Labs uses exactly this.
      //
      // Everything else this viewer used to do (bbox fitting, "face away from
      // skew" yaw, floor estimation) was a workaround for NOT knowing the above
      // and is deleted.
      import * as THREE from "three";
      import * as Spark from "https://esm.sh/@sparkjsdev/spark@2.1.0?deps=three@0.180.0";
      const { SparkRenderer, SplatMesh, SparkControls } = Spark;

      const params = new URLSearchParams(location.search);
      const DEFAULT_SPZ = "https://cdn.marble.worldlabs.ai/bd1c3e7a-e412-4950-bb82-045f95f047a5/0dea05c6-6b15-4d51-bc0d-5f46b5e3df5a_ceramic_500k.spz";
      const spzUrl = params.get("spz") || DEFAULT_SPZ;
      const titleArg = params.get("title");
      if (titleArg) document.getElementById("title").textContent = titleArg;

      // flip_y defaults TRUE = WL's mandatory OpenCV→OpenGL fix. flip_z is a
      // debug escape hatch for the rare splat that faces backwards.
      let flipY = params.get("flip_y") !== "false";
      let flipZ = params.get("flip_z") === "true";

      const statusEl = document.getElementById("status");

      // --- Renderer (WL uses antialias:false; we add preserveDrawingBuffer so
      // the headless recorder can canvas.toDataURL the frames). ---
      const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050507);

      // WL's exact camera init: fov 65, near 0.01, far 1000, AT ORIGIN, identity.
      const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.01, 1000);
      camera.position.set(0, 0, 0);
      camera.quaternion.set(0, 0, 0, 1);

      const spark = new SparkRenderer({ renderer });
      scene.add(spark);

      const splat = new SplatMesh({ url: spzUrl });
      function applyOrientation() {
        // base: OpenCV→OpenGL 180° about X when flipY (the normal case)
        const q = new THREE.Quaternion();
        if (flipY) q.set(1, 0, 0, 0);           // 180° about X
        else q.set(0, 0, 0, 1);                  // identity
        if (flipZ) {                              // optional extra 180° about Y
          q.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI));
        }
        splat.quaternion.copy(q).normalize();
      }
      applyOrientation();
      scene.add(splat);

      const controls = new SparkControls({ canvas: renderer.domElement });

      // Expose for the headless recorder (render_flythrough.mjs).
      window.DEBUG = { THREE, Spark, scene, camera, splat, spark, renderer };
      window.__recording = false;

      // --- Render loop. Skip controls.update while recording so the recorder
      // can drive the camera pose directly without a fight. ---
      renderer.setAnimationLoop(() => {
        if (!window.__recording) controls.update(camera);
        renderer.render(scene, camera);
      });

      // Ready signal for the recorder + status line.
      let ready = false;
      const readyPoll = setInterval(() => {
        try {
          const box = splat.getBoundingBox();
          const sz = box.getSize(new THREE.Vector3());
          if (sz.length() > 0.1 && isFinite(sz.x)) {
            ready = true;
            statusEl.innerHTML = `Spark ready · <a href="${spzUrl}" target="_blank">.spz</a> · drag to look, WASD to move`;
            clearInterval(readyPoll);
          }
        } catch {}
      }, 400);
      setTimeout(() => clearInterval(readyPoll), 30000);

      // --- UI ---
      const flipYEl = document.getElementById("flip-y-in"); flipYEl.checked = flipY;
      const flipZEl = document.getElementById("flip-z-in"); flipZEl.checked = flipZ;
      flipYEl.addEventListener("change", () => { flipY = flipYEl.checked; applyOrientation(); });
      flipZEl.addEventListener("change", () => { flipZ = flipZEl.checked; applyOrientation(); });

      function backToCapturePose() {
        camera.position.set(0, 0, 0);
        camera.quaternion.set(0, 0, 0, 1);
      }
      document.getElementById("reset-view").addEventListener("click", backToCapturePose);

      document.getElementById("copy-url").addEventListener("click", () => {
        const p = new URLSearchParams();
        p.set("spz", spzUrl);
        if (titleArg) p.set("title", titleArg);
        p.set("flip_y", String(flipY));
        p.set("flip_z", String(flipZ));
        const u = `${location.origin}${location.pathname}?${p.toString()}`;
        navigator.clipboard.writeText(u);
        const btn = document.getElementById("copy-url");
        const prev = btn.textContent; btn.textContent = "copied!";
        setTimeout(() => { btn.textContent = prev; }, 1200);
      });

      // --- Flythrough recorder (interactive / real-browser path) ---
      // "Camera pose fixed": the camera stays AT the capture origin and does a
      // 360° turntable look-around with a small drift circle for parallax. This
      // is exactly the original pano vantage, so it never wanders into the
      // Marble-dreamed content beyond windows/doors.
      const DURATION_SEC = 8, FPS = 30, DRIFT = 0.35;
      const recordBtn = document.getElementById("record-flythrough");
      const overlay = document.getElementById("record-overlay");
      const recStatus = document.getElementById("record-status");
      let recording = false;

      // Pose at normalized time t (0..1): position drifts on a small circle
      // around origin; look direction sweeps a full turn. Returns {pos, quat}.
      function poseAt(t) {
        const yaw = t * Math.PI * 2;
        const px = Math.cos(yaw + Math.PI / 2) * DRIFT;
        const pz = Math.sin(yaw + Math.PI / 2) * DRIFT;
        const py = 0.04 * Math.sin(t * Math.PI * 2);
        const look = new THREE.Vector3(px + Math.sin(yaw) * 3, py - 0.1, pz + Math.cos(yaw) * 3);
        const m = new THREE.Matrix4().lookAt(new THREE.Vector3(px, py, pz), look, new THREE.Vector3(0, 1, 0));
        const q = new THREE.Quaternion().setFromRotationMatrix(m);
        return { pos: [px, py, pz], quat: [q.x, q.y, q.z, q.w] };
      }
      window.__poseAt = poseAt;  // headless recorder reuses this

      async function recordFlythrough() {
        if (recording || !ready) { if (!ready) alert("splat still loading"); return; }
        recording = true; window.__recording = true;
        recordBtn.disabled = true; recordBtn.textContent = "🎬 recording…";
        recStatus.style.display = ""; overlay.style.display = "";

        const stream = renderer.domElement.captureStream(FPS);
        const mime = ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"].find((m) => MediaRecorder.isTypeSupported(m)) || "";
        const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
        const chunks = [];
        rec.ondataavailable = (e) => e.data?.size && chunks.push(e.data);
        rec.start();

        const total = DURATION_SEC * FPS, frameMs = 1000 / FPS, t0 = performance.now();
        await new Promise((resolve) => {
          function step() {
            const idx = Math.min(total - 1, Math.floor((performance.now() - t0) / frameMs));
            const p = poseAt(idx / (total - 1));
            camera.position.set(...p.pos);
            camera.quaternion.set(...p.quat);
            overlay.style.width = (idx / (total - 1) * 100) + "%";
            recStatus.textContent = `recording · ${idx + 1}/${total}`;
            if (idx >= total - 1) resolve(); else requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        });

        await new Promise((resolve) => { rec.onstop = resolve; rec.stop(); });
        const blob = new Blob(chunks, { type: mime || "video/webm" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${titleArg || "block-bloc"}-flythrough-${Date.now()}.webm`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);

        recStatus.textContent = `saved · ${(blob.size / 1024 / 1024).toFixed(1)} MB`;
        overlay.style.display = "none"; recordBtn.disabled = false; recordBtn.textContent = "🎬 record flythrough";
        setTimeout(() => { recStatus.style.display = "none"; }, 4000);
        recording = false; window.__recording = false;
        backToCapturePose();
      }
      recordBtn.addEventListener("click", recordFlythrough);

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    </script>
  </body>
</html>
